provider = "ollama"
base_url = "http://localhost:11434"

[providers.ollama]
type = "ollama"
base_url = "http://localhost:11434"

[tools]
shell = false
web = true
mcp = true

[permissions.web]
fetch_url = "ask"
search_web = "ask"

[permissions.mcp]
default = "ask"

[permissions.shell]
allowed_commands = [
    "ls*",
    "pwd",
    "echo*",
    "cat*",
]
blocked_commands = [
    "rm -rf /*",
]

[skills]
enabled = true
dir = "skills"

[agent]
max_turns = 50

[runtime]
working_dir = "."
